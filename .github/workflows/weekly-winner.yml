name: Weekly winner

on:
  schedule:
    - cron: "0 18 * * 0" # Sunday 18:00 UTC — end of the tallied week
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: asma-data-write
  cancel-in-progress: false

jobs:
  winner:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      POLLINATIONS_API_TOKEN: ${{ secrets.POLLINATIONS_API_TOKEN }}
      IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
      IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # only used as the media_host.py fallback if R2 isn't configured
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium
      - name: Ensure ffmpeg is present
        run: ffmpeg -version || (sudo apt-get update && sudo apt-get install -y ffmpeg)
      - run: uv run python scripts/run_weekly_winner.py
      - name: Commit updated state
        if: always()
        run: |
          git config user.name "asma-bot"
          git config user.email "actions@github.com"
          git pull --rebase
          git add data/
          git diff --staged --quiet || git commit -m "chore: weekly winner + leaderboard reset [skip ci]"
          git push
