name: Engage comments

on:
  schedule:
    - cron: "43 */4 * * *" # every 4 hours, offset from scheduled-content.yml's own cron
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: true

permissions:
  contents: write
  actions: write # needed for setup-uv's dependency cache save, not just contents

concurrency:
  group: asma-data-write
  cancel-in-progress: false

jobs:
  engage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
      IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run python scripts/run_engage_comments.py
      - name: Commit updated state
        if: always()
        run: |
          git config user.name "asma-bot"
          git config user.email "actions@github.com"
          git pull --rebase
          git add data/
          git diff --staged --quiet || git commit -m "chore: comment engagement + leaderboard update [skip ci]"
          git push
