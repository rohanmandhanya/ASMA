name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DRY_RUN: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv sync --frozen

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Ensure ffmpeg is present
        run: ffmpeg -version || (sudo apt-get update && sudo apt-get install -y ffmpeg)

      - name: Cache Piper voice model
        uses: actions/cache@v4
        with:
          path: assets/tts
          key: piper-voice-en_GB-alan-medium

      - name: Install Piper voice model
        run: uv run python -m piper.download_voices en_GB-alan-medium --download-dir assets/tts

      - name: Lint
        run: uv run ruff check src/ tests/ scripts/

      - name: Test
        run: uv run pytest -v
