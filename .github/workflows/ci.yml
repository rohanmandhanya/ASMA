name: CI

on:
  push:
    branches: [main]
  pull_request:

# actions: write is what setup-uv's enable-cache actually needs to save the
# dependency cache — without it, this repo's default (read-only) GITHUB_TOKEN
# makes every cache save fail (confirmed: 0 caches ever saved since the first
# commit, every run hitting the same rejection, not a random GitHub outage).
permissions:
  contents: read
  actions: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DRY_RUN: "true"
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - run: uv sync --frozen

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Ensure ffmpeg is present
        run: ffmpeg -version || (sudo apt-get update && sudo apt-get install -y ffmpeg)

      - name: Lint
        run: uv run ruff check src/ tests/ scripts/

      - name: Test
        run: uv run pytest -v
